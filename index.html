<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipping Estimation 2025 SID (MY 🇲🇾 | PH 🇵🇭 | SG 🇸🇬)</title>
  <style>
    body {
      background-color: #121212;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #1e1e1e;
      padding: 20px 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
      max-width: 1200px;
      width: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00bcd4;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #00bcd4;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #0097a7;
    }
    .results-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .country {
      background: #222;
      border-radius: 10px;
      padding: 15px;
      flex: 1;
      min-width: 350px;
      border: 1px solid #333;
    }
    .country h3 {
      color: #00bcd4;
      font-size: 20px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }
    .result {
      font-size: 15px;
      line-height: 1.7;
    }
    .highlight {
      font-size: 18px;
      font-weight: bold;
      color: #ffd166;
      margin-top: 15px;
    }
    .macro-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .macro-box {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
      position: relative;
      border: 1px solid #333;
    }
    .macro-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .macro-title {
      font-weight: 700;
      color: #ffd166;
    }
    .copy-btn {
      background: #00bcd4;
      border: none;
      border-radius: 5px;
      padding: 5px 8px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .copy-btn:hover {
      background: #0097a7;
    }
    @media (max-width: 1000px) {
      .results-row {
        flex-wrap: wrap;
      }
      .country {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Shipping Estimation 2025 SID (MY 🇲🇾 | PH 🇵🇭 | SG 🇸🇬)</h2>

    <label for="shipDate">Shipped Date/Pickup Done: (If 5DD, input paid date directly)</label>
    <input type="date" id="shipDate">

    <button onclick="calculate()">Calculate</button>

    <div id="results" class="results-row"></div>
  </div>

  <script>
    const holidays = {
      MY: [
        '2025-01-01','2025-01-14','2025-01-27','2025-01-29','2025-01-30',
        '2025-02-01','2025-02-11','2025-03-02','2025-03-04','2025-03-18','2025-03-23','2025-03-24','2025-03-31',
        '2025-04-01','2025-04-02','2025-04-18','2025-04-26','2025-04-27',
        '2025-05-01','2025-05-12','2025-05-17','2025-05-22','2025-05-30','2025-05-31',
        '2025-06-01','2025-06-02','2025-06-03','2025-06-07','2025-06-09','2025-06-27',
        '2025-07-07','2025-07-12','2025-07-22','2025-07-30','2025-07-31',
        '2025-08-24','2025-08-25','2025-08-31','2025-09-01','2025-09-05','2025-09-16',
        '2025-09-29','2025-09-30','2025-10-04','2025-10-11','2025-10-20','2025-11-07','2025-12-11','2025-12-24','2025-12-25'
      ],
      PH: [
        '2025-01-01','2025-01-29','2025-03-31','2025-04-09','2025-04-17','2025-04-18','2025-04-19',
        '2025-05-01','2025-06-06','2025-06-12','2025-08-21','2025-08-25','2025-10-31','2025-11-01','2025-11-30',
        '2025-12-08','2025-12-24','2025-12-25','2025-12-30','2025-12-31'
      ],
      SG: [
        '2025-01-01','2025-01-29','2025-01-30','2025-03-31','2025-04-18','2025-05-01','2025-05-12',
        '2025-06-07','2025-08-09','2025-10-20','2025-12-25'
      ]
    };

    const countryNames = {
      MY: "Malaysia 🇲🇾",
      PH: "Philippines 🇵🇭",
      SG: "Singapore 🇸🇬"
    };

    function isWeekend(date) {
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function isHoliday(date, countryCode) {
      const formatted = date.toISOString().split('T')[0];
      return holidays[countryCode].includes(formatted);
    }

    function addWorkingDays(startDate, days, countryCode) {
      let date = new Date(startDate);
      let added = 0;
      while (added < days) {
        date.setDate(date.getDate() + 1);
        if (!isWeekend(date) && !isHoliday(date, countryCode)) added++;
      }
      return date;
    }

    function countWorkingDaysBetween(start, end, countryCode) {
      let current = new Date(start);
      let count = 0;
      while (current < end) {
        current.setDate(current.getDate() + 1);
        if (!isWeekend(current) && !isHoliday(current, countryCode)) count++;
      }
      return count;
    }

    function copyToClipboard(boxId) {
      const box = document.getElementById(boxId);
      if (!box) return;
      const textEl = box.querySelector('.macro-text');
      const text = textEl ? textEl.innerText : box.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(`[data-id="${boxId}"]`);
        if (btn) {
          const prev = btn.innerText;
          btn.innerText = "Copied!";
          setTimeout(() => btn.innerText = prev, 1500);
        }
      });
    }

    function calculate() {
      const shipDateInput = document.getElementById('shipDate').value;
      const resultsDiv = document.getElementById('results');

      if (!shipDateInput) {
        resultsDiv.textContent = 'Please select the shipped date.';
        return;
      }

      const shippedDate = new Date(shipDateInput);
      const today = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      let output = "";

      for (const code of Object.keys(holidays)) {
        const est5 = addWorkingDays(shippedDate, 5, code);
        const est10 = addWorkingDays(shippedDate, 10, code);
        const est25 = addWorkingDays(shippedDate, 25, code);
        const rem5 = Math.max(0, countWorkingDaysBetween(today, est5, code));
        const rem10 = Math.max(0, countWorkingDaysBetween(today, est10, code));
        const rem25 = Math.max(0, countWorkingDaysBetween(today, est25, code));

        let section5 = "";
        if (code !== "PH") {
          section5 = `
            <div class="highlight">5 Working Days Estimate:</div>
            Estimated Arrival: <strong>${est5.toLocaleDateString('en-MY', options)}</strong><br>
            Remaining Working Days: <strong>${rem5}</strong>
            ${macroTemplate(code, est5, rem5, "5")}
          `;
        }

        output += `
          <div class="country" id="${code}">
            <h3>${countryNames[code]}</h3>
            <div class="result">
              ${section5}
              <div class="highlight">10 Working Days Estimate:</div>
              Estimated Arrival: <strong>${est10.toLocaleDateString('en-MY', options)}</strong><br>
              Remaining Working Days: <strong>${rem10}</strong>
              ${macroTemplate(code, est10, rem10, "10")}

              <div class="highlight">25 Working Days Estimate:</div>
              Estimated Arrival: <strong>${est25.toLocaleDateString('en-MY', options)}</strong><br>
              Remaining Working Days: <strong>${rem25}</strong>
              ${macroTemplate(code, est25, rem25, "25")}
            </div>
          </div>`;
      }
      resultsDiv.innerHTML = output;
    }

    function macroTemplate(code, estDate, remaining, label) {
      const dateText = estDate.toLocaleDateString('en-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const country = countryNames[code].replace(/🇲🇾|🇵🇭|🇸🇬/g, '').trim();
      return `
      <div class="macro-container">
        <div class="macro-box" id="${code}-indo-${label}">
          <div class="macro-header">
            <div class="macro-title">3PL Indonesia</div>
            <button class="copy-btn" data-id="${code}-indo-${label}" onclick="copyToClipboard('${code}-indo-${label}')">Copy</button>
          </div>
          <div class="macro-text">For your order, it is currently in transit to the sorting center. Please wait for the shipping process with an estimated ${remaining} working days and it will arrive by ${dateText} at the latest. For the next stage, the package will arrive at our sorting center.</div>
        </div>

        <div class="macro-box" id="${code}-handover-${label}">
          <div class="macro-header">
            <div class="macro-title">WH/SLS/Handover</div>
            <button class="copy-btn" data-id="${code}-handover-${label}" onclick="copyToClipboard('${code}-handover-${label}')">Copy</button>
          </div>
          <div class="macro-text">For your order, it is currently being sorted and will be heading to your country. Please wait for the shipping process with an estimated ${remaining} working days and it will arrive by ${dateText} at the latest. The package will be shipped to your country for the next phase.</div>
        </div>

        <div class="macro-box" id="${code}-overseas-${label}">
          <div class="macro-header">
            <div class="macro-title">3PL Overseas</div>
            <button class="copy-btn" data-id="${code}-overseas-${label}" onclick="copyToClipboard('${code}-overseas-${label}')">Copy</button>
          </div>
          <div class="macro-text">Your order has arrived in ${country} and (last tracking jasa kirim). You can check the details by using the tracking number () with the link (). Kindly wait maximum on ${dateText} but don’t worry it can be faster because after we check your parcel it's already picked up by the local courier at the latest. For the next stage, the package will arrive at our sorting center.</div>
        </div>
      </div>`;
    }
  </script>
</body>
</html>
